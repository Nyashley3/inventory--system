{% extends "base.html" %}
{% block content %}
<h3>Stocks</h3>
<div class="row">
  <div class="col-md-6">
    <h6>Set Stock</h6>
    <input id="s-branch" class="form-control mb-2" placeholder="branch_id">
    <input id="s-product" class="form-control mb-2" placeholder="product_id">
    <input id="s-qty" class="form-control mb-2" placeholder="quantity">
    <input id="s-th" class="form-control mb-2" placeholder="threshold">
    <button id="s-set" class="btn btn-primary">Set</button>
  </div>
  <div class="col-md-6">
    <h6>Low Stock Alerts</h6>
    <div id="low-list"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/stocks.js"></script>
{% endblock %}
