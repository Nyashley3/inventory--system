{% extends "base.html" %}
{% block title %}Stock Control — MobileTill Pulse{% endblock %}
{% block content %}
<h3>Stock Control</h3>
<div class="row">
  <div class="col-md-5">
    <div class="card mb-4">
      <div class="card-header bg-primary text-white">
        <h6 class="mb-0">Update Inventory</h6>
      </div>
      <div class="card-body">
        <div class="mb-2"><input id="s-branch" class="form-control" placeholder="Branch ID"></div>
        <div class="mb-2"><input id="s-product" class="form-control" placeholder="Product ID"></div>
        <div class="mb-2"><input id="s-location" class="form-control" placeholder="Warehouse / Bin Location"></div>
        <div class="mb-2"><input id="s-qty" class="form-control" placeholder="Quantity" type="number" min="0"></div>
        <div class="mb-2"><input id="s-th" class="form-control" placeholder="Threshold" type="number" min="0"></div>
        <button id="s-set" class="btn btn-primary w-100">Save Stock</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header bg-warning text-dark">
        <h6 class="mb-0">Low Stock Alerts</h6>
      </div>
      <div class="card-body" id="low-list"></div>
    </div>
  </div>

  <div class="col-md-7">
    <div class="card mb-4">
      <div class="card-header bg-info text-white">
        <h6 class="mb-0">Current Stock Levels</h6>
      </div>
      <div class="card-body">
        <div class="row g-2 mb-3">
          <div class="col-sm-5"><input id="filter-branch" class="form-control" placeholder="Branch ID"></div>
          <div class="col-sm-5"><input id="filter-product" class="form-control" placeholder="Product ID"></div>
          <div class="col-sm-2"><button id="btn-load-stocks" class="btn btn-secondary w-100">Refresh</button></div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm" id="stock-table">
            <thead>
              <tr><th>Branch</th><th>Product</th><th>Barcode</th><th>Qty</th><th>Threshold</th><th>Location</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/stocks.js"></script>
{% endblock %}
