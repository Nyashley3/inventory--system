{% extends "base.html" %}
{% block content %}
<h3>Employees</h3>
<p class="section-intro">As manager or admin, view every user account, lock access, reset passwords, and create new users for your branch.</p>
<div id="employees-alert"></div>
<div class="card mb-4 p-3">
  <h5>Create User</h5>
  <div class="row g-2 align-items-end">
    <div class="col-md-3">
      <label for="new-username" class="form-label">Username</label>
      <input id="new-username" class="form-control" placeholder="Username">
    </div>
    <div class="col-md-3">
      <label for="new-password" class="form-label">Password</label>
      <input id="new-password" type="password" class="form-control" placeholder="Password">
    </div>
    <div class="col-md-2">
      <label for="new-role" class="form-label">Role</label>
      <select id="new-role" class="form-select">
        <option value="cashier">Cashier</option>
        <option value="supervisor">Supervisor</option>
        <option value="manager">Manager</option>
      </select>
    </div>
    <div class="col-md-2">
      <label for="new-branch" class="form-label">Branch ID</label>
      <input id="new-branch" class="form-control" placeholder="Branch ID (optional)">
    </div>
    <div class="col-md-2">
      <button id="create-user" class="btn btn-primary w-100">Create User</button>
    </div>
  </div>
</div>
<table class="table table-sm" id="employees-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Role</th>
      <th>Branch</th>
      <th>Status</th>
      <th>Created</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
{% endblock %}

{% block scripts %}
<script src="/static/js/employees.js"></script>
{% endblock %}
