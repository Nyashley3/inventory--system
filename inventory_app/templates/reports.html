{% extends "base.html" %}
{% block content %}
<h3>Reports</h3>
<div class="row">
  <div class="col-md-6">
    <select id="r-range" class="form-select mb-2"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select>
    <input id="r-branch" class="form-control mb-2" placeholder="branch_id (optional)">
    <button id="r-load" class="btn btn-primary">Load Report</button>
  </div>
  <div class="col-md-6">
    <div id="r-card" class="card p-3 text-secondary">Choose a range and click Load Report to see a simple summary.</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/reports.js"></script>
{% endblock %}
