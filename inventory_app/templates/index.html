<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MobileTill Pulse — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="page-card mx-auto" style="max-width:900px;">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h2 class="mb-3">MobileTill Pulse</h2>
          <p class="section-intro">Login to manage products, branch stock, sales, and reports from one mobile-friendly dashboard.</p>
        </div>
        <div class="col-md-6 text-md-end">
          <span class="badge bg-primary">Fast launch</span>
          <span class="badge bg-secondary">Mobile ready</span>
        </div>
      </div>
      <hr>
      <div id="alert"></div>
      <div class="row">
        <div class="col-md-6">
          <h5>Login</h5>
          <div class="mb-3"><input id="login-username" class="form-control" placeholder="username"></div>
          <div class="mb-3"><input id="login-password" type="password" class="form-control" placeholder="password"></div>
          <button id="btn-login" class="btn btn-primary w-100">Login</button>
        </div>
        <div class="col-md-6">
          <h5>Account access</h5>
          <p>New accounts must be created by an existing manager or administrator. Contact your administrator for access.</p>
        </div>
      </div>
    </div>
  </div>
  <script>
    const alertContainer = document.getElementById('alert');
    const alertEl = (msg, cls='danger') => {
      alertContainer.innerHTML = `<div class="alert alert-${cls} alert-dismissible fade show" role="alert">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
    };

    const usernameInput = document.getElementById('login-username');
    const passwordInput = document.getElementById('login-password');
    const loginButton = document.getElementById('btn-login');

    async function handleLogin(event) {
      if (event) event.preventDefault();
      const u = usernameInput.value.trim();
      const p = passwordInput.value;
      if (!u || !p) {
        alertEl('Please enter both username and password.', 'warning');
        return;
      }

      loginButton.disabled = true;
      loginButton.innerText = 'Signing in...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username: u, password: p})
        });
        let body;
        try {
          body = await res.json();
        } catch (parseError) {
          body = {msg: res.statusText || 'Unexpected response from server.'};
        }

        if (res.ok && body.access_token) {
          localStorage.setItem('token', body.access_token);
          location.href = '/dashboard';
          return;
        }

        const message = body.msg || `Login failed (${res.status}).`;
        alertEl(message, 'danger');
        console.error('Login failed', res.status, body);
      } catch (err) {
        alertEl('Unable to reach the server. Please make sure the app is running and try again.', 'danger');
        console.error('Login error', err);
      } finally {
        loginButton.disabled = false;
        loginButton.innerText = 'Login';
      }
    }

    loginButton.addEventListener('click', handleLogin);
    [usernameInput, passwordInput].forEach(input => input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        handleLogin(event);
      }
    }));
  </script>
</body>
</html>
