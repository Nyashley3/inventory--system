<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MobileTill Pulse — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="hero-card mx-auto max-w-900">
      <div class="row gy-4 align-items-center">
        <div class="col-md-6">
          <h1 class="mb-3">MobileTill Pulse</h1>
          <p class="section-intro">The fast, mobile-friendly inventory dashboard for branches, products, stock alerts, checkout, and sales reporting.</p>
          <div class="d-flex flex-wrap gap-2">
            <span class="feature-badge">Fast launch</span>
            <span class="feature-badge">Branch control</span>
            <span class="feature-badge">Low stock alerts</span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="page-card">
            <h4 class="mb-3">Sign in</h4>
            <div id="alert"></div>
            <div class="mb-3"><input id="login-username" class="form-control" placeholder="Username"></div>
            <div class="mb-3"><input id="login-password" type="password" class="form-control" placeholder="Password"></div>
            <button id="btn-login" class="btn btn-primary w-100">Login</button>
            <p class="text-muted mt-3 mb-0">New users must be created by a manager or administrator. Ask your branch leader for access.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/js/login.js"></script>
</body>
</html>
