<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MobileTill Pulse — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="page-card mx-auto" style="max-width:900px;">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h2 class="mb-3">MobileTill Pulse</h2>
          <p class="section-intro">Login to manage products, branch stock, sales, and reports from one mobile-friendly dashboard.</p>
        </div>
        <div class="col-md-6 text-md-end">
          <span class="badge bg-primary">Fast launch</span>
          <span class="badge bg-secondary">Mobile ready</span>
        </div>
      </div>
      <hr>
      <div id="alert"></div>
      <div class="row">
        <div class="col-md-6">
          <h5>Login</h5>
          <div class="mb-3"><input id="login-username" class="form-control" placeholder="username"></div>
          <div class="mb-3"><input id="login-password" type="password" class="form-control" placeholder="password"></div>
          <button id="btn-login" class="btn btn-primary w-100">Login</button>
        </div>
        <div class="col-md-6">
          <h5>Signup</h5>
          <div class="mb-3"><input id="signup-username" class="form-control" placeholder="username"></div>
          <div class="mb-3"><input id="signup-password" type="password" class="form-control" placeholder="password"></div>
          <div class="mb-3">
            <select id="signup-role" class="form-select"><option value="cashier">cashier</option><option value="supervisor">supervisor</option></select>
          </div>
          <button id="btn-signup" class="btn btn-outline-primary w-100">Signup</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const alertEl = (msg, cls='danger') => document.getElementById('alert').innerHTML = `<div class="alert alert-${cls}">${msg}</div>`;
    document.getElementById('btn-login').onclick = async () => {
      const u = document.getElementById('login-username').value;
      const p = document.getElementById('login-password').value;
      const res = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
      const j = await res.json();
      if (res.ok) { localStorage.setItem('token', j.access_token); location.href='/dashboard'; }
      else alertEl(j.msg||JSON.stringify(j));
    }
    document.getElementById('btn-signup').onclick = async () => {
      const u = document.getElementById('signup-username').value;
      const p = document.getElementById('signup-password').value;
      const role = document.getElementById('signup-role').value;
      const res = await fetch('/api/signup',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p,role})});
      const j = await res.json();
      if (res.ok) alertEl('Created user '+j.username, 'success'); else alertEl(j.msg||JSON.stringify(j));
    }
  </script>
</body>
</html>
