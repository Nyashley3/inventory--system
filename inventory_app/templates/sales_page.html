{% extends "base.html" %}
{% block content %}
<h3>Sales</h3>
<div class="row">
  <div class="col-md-6">
    <h6>Barcode Scanner</h6>
    <div id="scanner"></div>
    <button id="btn-start" class="btn btn-success">Start Scan</button>
    <button id="btn-stop" class="btn btn-warning">Stop</button>
    <div id="scan-result" class="mt-2"></div>
  </div>
  <div class="col-md-6">
    <h6>Create Sale</h6>
    <input id="sale-branch" class="form-control mb-2" placeholder="branch_id">
    <input id="sale-product" class="form-control mb-2" placeholder="product_id or click a product below">
    <input id="sale-qty" class="form-control mb-2" placeholder="quantity" value="1">
    <button id="btn-sale" class="btn btn-primary mb-3">Record Sale</button>
    <div id="sale-result" class="mb-4"></div>
    <h6>Available Products</h6>
    <div class="input-group mb-2">
      <input id="sale-filter-branch" class="form-control" placeholder="branch_id (optional)">
      <button id="btn-load-products" class="btn btn-outline-secondary">Refresh</button>
    </div>
    <div class="table-responsive sales-product-table-scroll">
      <table class="table table-sm" id="sales-products-table">
        <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/@ericblade/quagga2@1.2.6/dist/quagga.min.js"></script>
<script src="/static/js/scan.js"></script>
<script src="/static/js/sales.js"></script>
{% endblock %}
