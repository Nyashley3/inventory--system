{% extends "base.html" %}
{% block content %}
<h3>Checkout — Point of Sale</h3>

<div class="row">
  <!-- Search & Add Panel -->
  <div class="col-md-4">
    <div class="card mb-4">
      <div class="card-header bg-primary text-white">
        <h6 class="mb-0">Add Products</h6>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Branch ID</label>
          <input id="checkout-branch" class="form-control" placeholder="e.g., 1" type="number">
        </div>
        
        <div class="mb-3">
          <label class="form-label">Search Product</label>
          <div class="input-group">
            <input id="checkout-search" class="form-control" placeholder="Barcode or Product ID">
            <button id="btn-search-product" class="btn btn-outline-primary">Search</button>
          </div>
        </div>

        <div id="search-result" class="mb-3 p-2 border rounded checkout-search-result d-none">
          <div id="product-details"></div>
          <div class="mt-2">
            <input id="add-quantity" class="form-control form-control-sm mb-2" placeholder="Quantity" type="number" value="1" min="1">
            <button id="btn-add-to-cart" class="btn btn-sm btn-success w-100">Add to Cart</button>
          </div>
        </div>

        <div id="search-alert" class="mb-3"></div>

        <hr>
        <h6>Quick Stats</h6>
        <div id="quick-stats" class="text-sm">
          <p>Cart Items: <strong id="stat-cart-count">0</strong></p>
          <p>Subtotal: <strong id="stat-subtotal">$0.00</strong></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Cart Panel -->
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-success text-white">
        <h6 class="mb-0">Shopping Cart</h6>
      </div>
      <div class="card-body">
        <div class="table-responsive checkout-table-scroll">
          <table class="table table-sm table-hover" id="cart-table">
            <thead class="table-light sticky-top">
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="empty-cart-msg" class="text-center py-4 text-muted">
          <p>Cart is empty. Search and add products above.</p>
        </div>

        <hr>

        <!-- Totals Section -->
        <div class="row">
          <div class="col-md-6 offset-md-6">
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal:</span>
              <span id="total-subtotal">$0.00</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="fw-bold">Total:</span>
              <span class="fw-bold" id="total-amount">$0.00</span>
            </div>
            <button id="btn-clear-cart" class="btn btn-outline-danger w-100 mb-2">Clear Cart</button>
            <button id="btn-complete-sale" class="btn btn-success w-100 btn-lg">Complete Sale</button>
          </div>
        </div>

        <!-- Sale Result -->
        <div id="sale-alert" class="mt-4"></div>
        <div id="sale-result" class="mt-3"></div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/checkout.js"></script>
{% endblock %}
