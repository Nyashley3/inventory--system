{% extends "base.html" %}
{% block content %}
<h3>Products</h3>
<div id="product-admin-actions" class="mb-3 d-flex flex-wrap gap-2 align-items-end">
  <input id="p-name" class="form-control me-2" placeholder="Name">
  <input id="p-barcode" class="form-control me-2" placeholder="Barcode">
  <input id="p-price" class="form-control me-2" placeholder="Price" type="number" step="0.01">
  <select id="p-currency" class="form-select me-2" style="max-width: 140px;">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="GBP">GBP</option>
    <option value="CAD">CAD</option>
    <option value="AUD">AUD</option>
    <option value="JPY">JPY</option>
  </select>
  <button id="p-create" class="btn btn-primary">Create</button>
</div>
<div id="products-alert"></div>
<table class="table table-sm" id="products-table">
  <thead><tr><th>ID</th><th>Name</th><th>Barcode</th><th>Price</th><th>Currency</th><th></th></tr></thead>
  <tbody></tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
let PRODUCTS_ROLE = 'manager';
async function loadProducts(){
  try {
    const j = await apiGet('/api/products');
    const tbody = document.querySelector('#products-table tbody'); tbody.innerHTML='';
    j.forEach(p=>{ const tr=document.createElement('tr'); const actions = PRODUCTS_ROLE === 'cashier' ? '' : `<button class='btn btn-sm btn-danger' data-id='${p.id}'>Delete</button>`; tr.innerHTML=`<td>${p.id}</td><td>${p.name}</td><td>${p.barcode}</td><td>${p.price.toFixed(2)}</td><td>${p.currency || 'USD'}</td><td>${actions}</td>`; tbody.appendChild(tr);});
    if (PRODUCTS_ROLE !== 'cashier') {
      document.querySelectorAll('#products-table button').forEach(b=>b.onclick=async e=>{ try { await apiDelete('/api/products/'+b.dataset.id); showAlert('Product deleted successfully.', 'success'); loadProducts(); } catch (err) { showAlert(err.msg || 'Could not delete product.', 'danger'); }});
    }
  } catch (err) {
    showAlert(err.msg || 'Unable to load products.', 'danger');
  }
}
document.getElementById('p-create').onclick = async ()=>{
  const name = document.getElementById('p-name').value.trim();
  const barcode = document.getElementById('p-barcode').value.trim();
  const price = parseFloat(document.getElementById('p-price').value || 0);
  const currency = document.getElementById('p-currency').value;
  if (!name) { showAlert('Product name cannot be empty.', 'warning'); return; }
  if (!barcode) { showAlert('Barcode is required to save a product.', 'warning'); return; }
  try {
    const result = await apiPost('/api/products',{name, barcode, price, currency});
    showAlert(`Product "${result.name}" created successfully.`, 'success');
    document.getElementById('p-name').value = '';
    document.getElementById('p-barcode').value = '';
    document.getElementById('p-price').value = '';
    document.getElementById('p-currency').value = 'USD';
    loadProducts();
  } catch (err) {
    showAlert(err.msg || 'Could not create product. Please check the inputs.', 'danger');
  }
}
(function init(){
  try {
    const token = localStorage.getItem('token');
    if (token) {
      const payload = JSON.parse(atob(token.split('.')[1] || '{}'));
      PRODUCTS_ROLE = payload.role || PRODUCTS_ROLE;
      if (PRODUCTS_ROLE === 'cashier') {
        document.getElementById('product-admin-actions').style.display = 'none';
        document.getElementById('products-alert').innerHTML = '<div class="alert alert-info">Cashiers can view product details here, but only managers and supervisors can create or delete products.</div>';
      }
    }
  } catch (e) {
    console.warn('Unable to determine user role for products page', e);
  }
  loadProducts();
})();
</script>
{% endblock %}
