<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="MobileTill Pulse inventory dashboard for branches, stock alerts, sales, and reports.">
  <title>{% block title %}MobileTill Pulse{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark nav-modern shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="/dashboard">
        <span class="brand-logo">MT</span>
        <span class="ms-2">MobileTill Pulse</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navmenu">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0 nav-pill-group">
          <li class="nav-item" data-roles="cashier,supervisor,manager,admin"><a class="nav-link" href="/dashboard"><span class="nav-icon">🏠</span> Home</a></li>
          <li class="nav-item" data-roles="cashier"><a class="nav-link" href="/checkout"><span class="nav-icon">🛒</span> Checkout</a></li>
          <li class="nav-item" data-roles="cashier,supervisor,manager,admin"><a class="nav-link" href="/returns"><span class="nav-icon">↩️</span> Returns</a></li>
          <li class="nav-item" data-roles="supervisor,manager"><a class="nav-link" href="/products"><span class="nav-icon">📦</span> Products</a></li>
          <li class="nav-item" data-roles="manager"><a class="nav-link" href="/branches_page"><span class="nav-icon">🏢</span> Branches</a></li>
          <li class="nav-item" data-roles="supervisor,manager"><a class="nav-link" href="/stocks_page"><span class="nav-icon">📊</span> Stock</a></li>
          <li class="nav-item" data-roles="manager,admin"><a class="nav-link" href="/suppliers"><span class="nav-icon">🤝</span> Suppliers</a></li>
          <li class="nav-item" data-roles="supervisor,manager"><a class="nav-link" href="/reports_page"><span class="nav-icon">📈</span> Reports</a></li>
          <li class="nav-item" data-roles="manager,admin"><a class="nav-link" href="/employees_page"><span class="nav-icon">👥</span> Employees</a></li>
        </ul>
        <div class="d-flex align-items-center nav-user-panel">
          <div class="dropdown">
            <a id="nav-user" class="text-white me-3 dropdown-toggle nav-user-link" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Guest</a>
            <ul class="dropdown-menu dropdown-menu-end" id="nav-user-menu">
              <li><a class="dropdown-item" id="nav-profile-link" href="/profile" data-hide-for-admin="true">Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" id="nav-logout-link" href="#">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <main class="flex-grow-1">
    <div class="container mt-2" id="page-content">
      <div id="page-alert"></div>
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer id="page-footer" class="container">
    <small>MobileTill Pulse · Inventory management made simple.</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/pages.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
